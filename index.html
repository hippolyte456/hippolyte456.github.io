<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hippolyte Dreyfus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <header>
    <nav class="navbar">
      <a href="#" class="nav-logo">Hippolyte Dreyfus</a>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- About / Research Engineer banner -->
  <section id="about" class="banner-research">
    <div class="banner-inner">
      <div class="banner-meta">Research Engineer · Neurosciences</div>
      <h1>Hippolyte Dreyfus</h1>
      <p class="banner-desc">
        <!-- [Votre accroche ici] -->
      </p>
      <div class="tags">
        <span class="tag">IRM</span>
        <span class="tag">MEG</span>
        <span class="tag">EEG</span>
        <span class="tag">Acquisition</span>
        <span class="tag">Prétraitement</span>
        <span class="tag">Pipelines</span>
        <span class="tag">Research Experience (RX)</span>
      </div>
      <p class="banner-body">
        <!-- [Description détaillée de votre travail salarié ici] -->
      </p>
    </div>
  </section>

  <!-- Projects -->
  <section id="projects">
    <div class="section-inner">

      <div class="proj-toolbar">
        <h2>Projects</h2>
        <div class="view-toggle">
          <button class="toggle-btn active" data-view="category">By category</button>
          <button class="toggle-btn" data-view="state">By state</button>
        </div>
      </div>

      <!-- Source registry (fetched by JS, not rendered directly) -->
      <div id="proj-registry" hidden>
        <div data-proj="projects/openhabitat.proj"   data-category="lifestyle"   data-icon="🏡" data-title="OpenHabitat"></div>
        <div data-proj="projects/heligoyourte.proj"  data-category="lifestyle"   data-icon="⛺" data-title="Yourte"></div>
        <div data-proj="projects/wing4all.proj"      data-category="passion"     data-icon="🌊" data-title="Wing4All"></div>
        <div data-proj="projects/deepConnexion.proj" data-category="psychiatrie" data-icon="🧠" data-title="DeepConnexion"></div>
      </div>

      <!-- Views rendered by JS -->
      <div id="view-category" class="proj-view"></div>
      <div id="view-state"    class="proj-view"></div>

    </div>
  </section>

  <!-- Contact -->
  <section id="contact">
    <div class="section-inner">
      <h2>Get in touch</h2>
      <p><!-- [Votre message ici] --></p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Hippolyte Dreyfus · <a href="https://github.com/hippolyte456" target="_blank">GitHub</a></p>
  </footer>

  <script src="assets/proj-loader.js"></script>
</body>
</html>
